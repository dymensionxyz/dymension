syntax = "proto3";
package dymensionxyz.dymension.agent;

import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";
import "cosmos/base/v1beta1/coin.proto";
import "dymensionxyz/dymension/common/tee.proto";

option go_package = "github.com/dymensionxyz/dymension/v3/x/agent/types";

// Agent is a registered agent in the registry. Its policy is immutable after
// registration - a new agent version is a new registration.
message Agent {
  string id = 1;
  string owner = 2;
  dymensionxyz.dymension.common.Policy policy = 3
      [ (gogoproto.nullable) = false ];
  bool active = 4;
  // action_seq is the next sequence number for the agent's action log.
  uint64 action_seq = 5;
}

// ActionLogEntry is an immutable entry in an agent's attested action log.
message ActionLogEntry {
  string agent_id = 1;
  uint64 seq = 2;
  bytes payload = 3;
  bytes payload_hash = 4;
  int64 height = 5;
  google.protobuf.Timestamp time = 6
      [ (gogoproto.nullable) = false, (gogoproto.stdtime) = true ];
}

// Params defines the agent module parameters.
message Params {
  // agent_registration_fee is charged (and burned) on registration.
  cosmos.base.v1beta1.Coin agent_registration_fee = 1
      [ (gogoproto.nullable) = false ];
  // max_action_bytes bounds the payload size of a submitted action.
  uint64 max_action_bytes = 2;
}
