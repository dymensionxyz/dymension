syntax = "proto3";
package dymensionxyz.dymension.agent;

option go_package = "github.com/dymensionxyz/dymension/v3/x/agent/types";

import "cosmos_proto/cosmos.proto";
import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "dymensionxyz/dymension/common/tee.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;

  // RegisterAgent registers a new agent with an immutable attestation policy.
  rpc RegisterAgent(MsgRegisterAgent) returns (MsgRegisterAgentResponse);

  // DeactivateAgent deactivates an existing agent. Owner only.
  rpc DeactivateAgent(MsgDeactivateAgent) returns (MsgDeactivateAgentResponse);

  // UpdateAgentPolicy schedules a timelocked rotation of the agent's
  // attestation policy. Owner only. The new policy activates after
  // policy_rotation_delay_blocks.
  rpc UpdateAgentPolicy(MsgUpdateAgentPolicy)
      returns (MsgUpdateAgentPolicyResponse);

  // SubmitAttestedAction verifies a TEE attestation token against the agent's
  // policy, bound by a per-action nonce, and appends an entry to the agent's
  // action log.
  rpc SubmitAttestedAction(MsgSubmitAttestedAction)
      returns (MsgSubmitAttestedActionResponse);

  // SubmitFeedback submits or overwrites the client's feedback score for an
  // agent, grounded in an existing action-log entry.
  rpc SubmitFeedback(MsgSubmitFeedback) returns (MsgSubmitFeedbackResponse);

  // RevokeFeedback removes the client's feedback for an agent.
  rpc RevokeFeedback(MsgRevokeFeedback) returns (MsgRevokeFeedbackResponse);
}

message MsgRegisterAgent {
  option (cosmos.msg.v1.signer) = "owner";

  string owner = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
  dymensionxyz.dymension.common.Policy policy = 3
      [ (gogoproto.nullable) = false ];
}

message MsgRegisterAgentResponse {}

message MsgDeactivateAgent {
  option (cosmos.msg.v1.signer) = "owner";

  string owner = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
}

message MsgDeactivateAgentResponse {}

message MsgUpdateAgentPolicy {
  option (cosmos.msg.v1.signer) = "owner";

  string owner = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
  dymensionxyz.dymension.common.Policy new_policy = 3
      [ (gogoproto.nullable) = false ];
}

message MsgUpdateAgentPolicyResponse { int64 activation_height = 1; }

// MsgSubmitAttestedAction submits an attested action on behalf of an agent.
// The submitter signs and pays for the tx but is not validated against the
// agent: the enclave token authorizes the content, so any account may submit a
// valid attested action.
message MsgSubmitAttestedAction {
  option (cosmos.msg.v1.signer) = "submitter";

  string submitter = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
  bytes payload = 3;
  string token = 4;
}

message MsgSubmitAttestedActionResponse { uint64 seq = 1; }

message MsgSubmitFeedback {
  option (cosmos.msg.v1.signer) = "client";

  string client = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
  // score is fixed-point with 2 decimals: 0..10000 == 0.00%..100.00%.
  uint32 score = 3;
  // tag1 is the primary dimension name, e.g. "liveness". Required.
  string tag1 = 4;
  // tag2 is an optional secondary dimension name.
  string tag2 = 5;
  // evidence_seq must reference an existing action-log entry of the agent.
  uint64 evidence_seq = 6;
}

message MsgSubmitFeedbackResponse {}

message MsgRevokeFeedback {
  option (cosmos.msg.v1.signer) = "client";

  string client = 1 [ (cosmos_proto.scalar) = "cosmos.AddressString" ];
  string agent_id = 2;
}

message MsgRevokeFeedbackResponse {}
