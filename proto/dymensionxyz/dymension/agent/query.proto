syntax = "proto3";
package dymensionxyz.dymension.agent;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "dymensionxyz/dymension/agent/agent.proto";

option go_package = "github.com/dymensionxyz/dymension/v3/x/agent/types";

service Query {
  // Params queries the module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/dymensionxyz/dymension/agent/params";
  }

  // Agent queries a single agent by id.
  rpc Agent(QueryAgentRequest) returns (QueryAgentResponse) {
    option (google.api.http).get =
        "/dymensionxyz/dymension/agent/agents/{agent_id}";
  }

  // Agents queries all registered agents, paginated.
  rpc Agents(QueryAgentsRequest) returns (QueryAgentsResponse) {
    option (google.api.http).get = "/dymensionxyz/dymension/agent/agents";
  }

  // AgentActions queries an agent's attested action log, paginated.
  rpc AgentActions(QueryAgentActionsRequest)
      returns (QueryAgentActionsResponse) {
    option (google.api.http).get =
        "/dymensionxyz/dymension/agent/agents/{agent_id}/actions";
  }

  // AgentAction queries a single action log entry by (agent_id, seq).
  rpc AgentAction(QueryAgentActionRequest) returns (QueryAgentActionResponse) {
    option (google.api.http).get =
        "/dymensionxyz/dymension/agent/agents/{agent_id}/actions/{seq}";
  }

  // EscrowBalance queries an agent's escrow balance and the remaining spend
  // budget in the current rate window.
  rpc EscrowBalance(QueryEscrowBalanceRequest)
      returns (QueryEscrowBalanceResponse) {
    option (google.api.http).get =
        "/dymensionxyz/dymension/agent/agents/{agent_id}/escrow";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1 [ (gogoproto.nullable) = false ];
}

message QueryAgentRequest { string agent_id = 1; }

message QueryAgentResponse { Agent agent = 1 [ (gogoproto.nullable) = false ]; }

message QueryAgentsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAgentsResponse {
  repeated Agent agents = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryAgentActionsRequest {
  string agent_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryAgentActionsResponse {
  repeated ActionLogEntry actions = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryAgentActionRequest {
  string agent_id = 1;
  uint64 seq = 2;
}

message QueryAgentActionResponse {
  ActionLogEntry action = 1 [ (gogoproto.nullable) = false ];
}

message QueryEscrowBalanceRequest { string agent_id = 1; }

message QueryEscrowBalanceResponse {
  repeated cosmos.base.v1beta1.Coin balance = 1 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
  // remaining_window_budget is the spend budget left in the rate window at the
  // current height. Zero when spending is disabled.
  string remaining_window_budget = 2 [
    (gogoproto.nullable) = false,
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int"
  ];
}
